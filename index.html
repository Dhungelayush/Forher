<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person</title>
    <style>
        /* --- General Styling --- */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
            background-color: #f7e1e7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .pink-font {
            color: #ff4081; 
            font-weight: bold;
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.05);
        }

        /* --- Audio Unlock Splash Screen --- */
        #welcome-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #f7e1e7 0%, #ffd1dc 100%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
            padding: 20px;
            box-sizing: border-box;
        }

        .welcome-card {
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(255, 64, 129, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .start-btn {
            background: linear-gradient(to right, #ff9a9e, #ff4081);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 5px 15px rgba(255, 64, 129, 0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        /* --- Responsive Game Container --- */
        #game-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            opacity: 1;
            transition: opacity 1.5s ease-out;
            position: relative;
            z-index: 10;
            padding: 10px;
            box-sizing: border-box;
        }

        .header-text {
            color: #fff;
            background: linear-gradient(to right, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            padding: 12px 24px;
            border-radius: 50px;
            margin-bottom: 15px;
            font-size: 1.1rem;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            max-width: 90%;
        }

        .memory-game {
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1 / 1; 
            display: flex;
            flex-wrap: wrap;
            perspective: 1000px;
        }

        .memory-card {
            width: calc(25% - 6px);
            height: calc(33.333% - 6px);
            margin: 3px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.4s;
            cursor: pointer;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.15);
            border-radius: 8px;
        }

        .memory-card:active {
            transform: scale(0.95);
        }

        .memory-card.flip {
            transform: rotateY(180deg);
            pointer-events: none;
        }

        .front-face, .back-face {
            width: 100%;
            height: 100%;
            position: absolute;
            border-radius: 8px;
            backface-visibility: hidden;
            background-color: #fff;
            box-sizing: border-box;
        }

        .front-face {
            transform: rotateY(180deg);
            object-fit: cover; 
        }

        .back-face {
            background: linear-gradient(45deg, #fad0c4 0%, #ffd1dc 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
        }

        /* --- Full Screen Grid Album --- */
        #slideshow-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 4px;
            background-color: #000; 
        }

        .album-slot {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #222;
        }

        .album-photo {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            opacity: 0;
            transition: opacity 1.8s ease-in-out;
        }

        /* --- Paragraph Subtitles Box --- */
        #voicemail-section {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 550px;
            height: 28vh;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in;
            display: block;
        }

        #subtitle-text {
            background-color: rgba(255, 255, 255, 0); /* CHANGED: Fully transparent background */
            padding: 18px;
            border-radius: 20px;
            font-size: 1.2rem; /* Increased size slightly for easier reading over photos */
            line-height: 1.6;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            overflow-y: auto;
            text-align: left;
            font-weight: bold; /* Bold text ensures text clarity over images */
            color: #ffffff; /* White color pops intensely over image grid backgrounds */
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9), -1px -1px 0 rgba(0,0,0,0.5), 1px -1px 0 rgba(0,0,0,0.5), -1px 1px 0 rgba(0,0,0,0.5), 1px 1px 0 rgba(0,0,0,0.5); /* Strong clean outline shadow keeps letters fully readable */
        }

        /* Continuous Typing Cursor Indicator */
        #subtitle-text::after {
            content: '✏️';
            animation: blink 1s infinite;
            margin-left: 4px;
            display: inline-block;
            vertical-align: middle;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.8));
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* --- Interactive Choice Overlay --- */
        #choice-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background-color: rgba(247, 225, 231, 0.94); 
            opacity: 0;
            visibility: hidden;
            transition: opacity 1s ease-in-out, visibility 1s;
            padding: 20px;
            box-sizing: border-box;
        }

        .choice-title {
            font-size: 1.8rem;
            margin-bottom: 30px;
            max-width: 400px;
        }

        .btn-container {
            display: flex;
            gap: 20px;
        }

        .choice-btn {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .choice-btn:active {
            transform: scale(0.95);
        }

        #yes-btn {
            background-color: #ff4081;
            color: white;
        }

        #no-btn {
            background-color: #ffffff;
            color: #666;
        }

        /* Custom Popup Message Modal */
        #popup-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 200;
            display: none;
            flex-direction: column;
            align-items: center;
            width: 85%;
            max-width: 400px;
            box-sizing: border-box;
            transition: transform 0.3s ease-out;
        }

        #popup-modal.show {
            display: flex;
            transform: translate(-50%, -50%) scale(1);
        }

        #popup-text {
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .close-btn {
            background: linear-gradient(to right, #ff9a9e, #ff4081);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <div class="welcome-card">
            <div class="pink-font" style="font-size: 1.6rem; margin-bottom: 10px;">MY BABY ❤️</div>
            <div class="pink-font" style="font-size: 1.1rem; font-weight: normal; color: #888;">I made a little puzzle out of our memories. Turn your volume up and click below to open it.</div>
            <button class="start-btn" id="start-game-btn">Play thiss</button>
        </div>
    </div>

    <div id="game-section">
        <div class="header-text pink-font">Match the moments... solve it to hear something sweet.</div>
        <div class="memory-game" id="game-grid"></div>
    </div>

    <div id="slideshow-container">
        <div class="album-slot"><img id="pic0" class="album-photo" src="image1.jpeg"></div>
        <div class="album-slot"><img id="pic1" class="album-photo" src="image2.jpeg"></div>
        <div class="album-slot"><img id="pic2" class="album-photo" src="image3.jpeg"></div>
        <div class="album-slot"><img id="pic3" class="album-photo" src="image4.jpeg"></div>
        <div class="album-slot"><img id="pic4" class="album-photo" src="image5.jpeg"></div>
        <div class="album-slot"><img id="pic5" class="album-photo" src="image6.jpeg"></div>
    </div>

    <div id="voicemail-section">
        <div id="subtitle-text"></div>
    </div>

    <div id="choice-section">
        <div class="choice-title pink-font">I am just your baby, won't you forgive me? ❤️</div>
        <div class="btn-container">
            <button class="choice-btn" id="yes-btn">Yes</button>
            <button class="choice-btn" id="no-btn">No</button>
        </div>
    </div>

    <div id="popup-modal">
        <div id="popup-text" class="pink-font"></div>
        <button class="close-btn" onclick="closeModal()">Close</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="background_music1.mp3" type="audio/mpeg">
    </audio>

    <audio id="voicemail-audio" preload="auto">
        <source src="voicemail.mp3" type="audio/mpeg">
    </audio>


<script>
    const images = [
        'image1.jpeg', 'image1.jpeg', 
        'image2.jpeg', 'image2.jpeg', 
        'image3.jpeg', 'image3.jpeg', 
        'image4.jpeg', 'image4.jpeg', 
        'image5.jpeg', 'image5.jpeg', 
        'image6.jpeg', 'image6.jpeg',
    ];

    const subtitles = [
        [0, "Baby... First, I love you. "],
        [3, "I love you the most. "],
        [5, "You are my heart, you are my love, you are my wife. "],
        [9, "You are my sunshine, you are my everything. "],
        [12, "My day starts with you, and ends with you. "],
        [16, "There isn't any moment or a second that I won't miss you. "],
        [21, "I miss you every second. I want you with me every second. "],
        [27, "Even if I love you for the rest of my life... "],
        [31, "It will be the best thing I will do. "],
        [34, "I won't get bored loving you. "],
        [37, "You are my favorite hobby, you are my favorite place. "],
        [41, "You are my everything. "],
        [44, "And I'm really sorry baby... from my heart. "],
        [49, "I'm really, really, really sorry. "],
        [53, "Mero... My life started with you. "],
        [57, "When you came, that's when my life started. "],
        [60, "And before that, nothing was there for me. "],
        [64, "After you, there is everything. "],
        [67, "And this... I don't wanna leave. "],
        [70, "I don't wanna be away with this life. "],
        [74, "Cause I love you, mero baby. "],
        [77, "I love you with whole my world. "],
        [80, "Ma kunai script wa kehi padhiraxuina, it is coming from my heart. "],
        [84, "It is coming from my heart. "],
        [87, "And... love, I love you. "],
        [91, "We will make things better, we will do better. "],
        [95, "We will be together, I will make you happy. "],
        [99, "I will try to be the best for you. "],
        [103, "And I love you so much, mero maya. "],
        [107, "I love you so much. Please, please, please forgive me. "],
        [112, "And let's... let's talk properly. "],
        [116, "Let's love properly... ❤️"]
    ];

    const wordsForYes = "Yay! Thank you for forgiving me, my queen. I love you the absolute most. Let's start over! 🥰❤️";
    const wordsForNo  = "I understand you still need some time to heal, baby. Take your time, I am right here waiting for you whenever you are ready. I love you endlessly. 🥺";

    const bgMusic = document.getElementById('bg-music');
    const voicemailAudio = document.getElementById('voicemail-audio');
    const subtitleText = document.getElementById('subtitle-text');
    const voicemailSection = document.getElementById('voicemail-section');
    const slideshowContainer = document.getElementById('slideshow-container');
    const gameGrid = document.getElementById('game-grid');
    const cards = [];

    // FIXED: Robust browser unlock sequence for audio assets
    document.getElementById('start-game-btn').addEventListener('click', () => {
        // Force fully loading the tracks on user gesture
        bgMusic.load();
        voicemailAudio.load();

        // Play and immediately pause to bypass the browser's autoplay block
        bgMusic.play().then(() => { 
            bgMusic.pause(); 
            bgMusic.volume = 0.12; // Double check volume setting is active
        }).catch(e => console.log("Audio unlock failed for bgMusic:", e));

        voicemailAudio.play().then(() => { 
            voicemailAudio.pause(); 
        }).catch(e => console.log("Audio unlock failed for voicemail:", e));
        
        const welcome = document.getElementById('welcome-screen');
        welcome.style.opacity = '0';
        setTimeout(() => { welcome.style.display = 'none'; }, 800);
    });

    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function initGame() {
        gameGrid.innerHTML = ''; 
        const shuffledImages = shuffle(images);

        shuffledImages.forEach((imgSrc, index) => {
            const card = document.createElement('div');
            card.classList.add('memory-card');
            card.dataset.framework = imgSrc;

            const frontFace = document.createElement('img');
            frontFace.src = imgSrc;
            frontFace.alt = `Moment ${index}`;
            frontFace.classList.add('front-face');

            const backFace = document.createElement('div');
            backFace.classList.add('back-face');
            backFace.innerText = '❤️'; 

            card.appendChild(frontFace);
            card.appendChild(backFace);
            gameGrid.appendChild(card);
            cards.push(card);
        });

        cards.forEach(card => card.addEventListener('click', flipCard));
    }

    let hasFlippedCard = false;
    let lockBoard = false;
    let firstCard, secondCard;
    let matchesFound = 0;
    const totalPairs = images.length / 2;

    function flipCard() {
        if (lockBoard) return;
        if (this === firstCard) return;

        this.classList.add('flip');

        if (!hasFlippedCard) {
            hasFlippedCard = true;
            firstCard = this;
            return;
        }

        secondCard = this;
        checkForMatch();
    }

    function checkForMatch() {
        let isMatch = firstCard.dataset.framework === secondCard.dataset.framework;
        isMatch ? disableCards() : unflipCards();
    }

    function disableCards() {
        firstCard.removeEventListener('click', flipCard);
        secondCard.removeEventListener('click', flipCard);
        matchesFound++;

        if (matchesFound === totalPairs) {
            handleWin();
        }
        resetBoard();
    }

    function unflipCards() {
        lockBoard = true;
        setTimeout(() => {
            firstCard.classList.remove('flip');
            secondCard.classList.remove('flip');
            resetBoard();
        }, 1000);
    }

    function resetBoard() {
        [hasFlippedCard, lockBoard] = [false, false];
        [firstCard, secondCard] = [null, null];
    }

    function handleWin() {
        document.getElementById('game-section').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('game-section').style.display = 'none';
            playAudio();
            revealAlbumGrid();
            startContinuousParagraphSubtitles(); 
        }, 1500); 
    }

    // FIXED: Streamlined clean execution fallback
    function playAudio() {
        bgMusic.currentTime = 0;
        bgMusic.volume = 0.12; 
        
        // Play background music with a safety guarantee
        const playBg = bgMusic.play();
        if (playBg !== undefined) {
            playBg.catch(err => {
                console.log("Background music context recovery required:", err);
                // Fallback direct retry if context stalled
                bgMusic.play();
            });
        }
        
        setTimeout(() => { 
            voicemailAudio.currentTime = 0;
            voicemailAudio.play().catch(err => console.log("Voicemail playback stalled:", err)); 
        }, 200); 
    }

    // --- CONTINUOUS PARAGRAPH TYPEWRITER CORE ---
    function startContinuousParagraphSubtitles() {
        voicemailSection.style.opacity = '1';
        
        let runningTypingTimeout = null;

        subtitles.forEach((subtitle) => {
            const delayInMs = subtitle[0] * 1000;
            const textToAppend = subtitle[1];

            setTimeout(() => {
                if (runningTypingTimeout) clearTimeout(runningTypingTimeout);
                
                let targetCharacterIndex = 0;
                
                function typeNextLetter() {
                    if (targetCharacterIndex < textToAppend.length) {
                        subtitleText.innerHTML += textToAppend.charAt(targetCharacterIndex);
                        targetCharacterIndex++;
                        subtitleText.scrollTop = subtitleText.scrollHeight;
                        
                        let calculatedSpeed = textToAppend.length > 55 ? 20 : 40;
                        runningTypingTimeout = setTimeout(typeNextLetter, calculatedSpeed);
                    }
                }
                typeNextLetter();
            }, delayInMs);
        });

        setTimeout(() => {
            showChoiceScreen();
        }, 121000); 
    }

    // --- REVEAL IMAGES FULL VIEWPORT GRID ---
    function revealAlbumGrid() {
        slideshowContainer.style.opacity = '1';
        
        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                const photoNode = document.getElementById(`pic${i}`);
                if (photoNode) photoNode.style.opacity = '1';
            }, 500 + (i * 2200)); 
        }
    }

    function showChoiceScreen() {
        const choiceSection = document.getElementById('choice-section');
        choiceSection.style.visibility = 'visible';
        choiceSection.style.opacity = '1';
    }

    document.getElementById('yes-btn').addEventListener('click', () => {
        showModal(wordsForYes);
    });

    document.getElementById('no-btn').addEventListener('click', () => {
        showModal(wordsForNo);
    });

    function showModal(messageText) {
        document.getElementById('popup-text').innerText = messageText;
        document.getElementById('popup-modal').classList.add('show');
    }

    function closeModal() {
        document.getElementById('popup-modal').classList.remove('show');
        document.getElementById('choice-section').style.opacity = '0';
        document.getElementById('choice-section').style.visibility = 'hidden';
    }

    initGame();
</script>
